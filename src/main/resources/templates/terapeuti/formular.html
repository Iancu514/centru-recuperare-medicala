<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titlu}">Formular Terapeut</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-hospital"></i> Centru Recuperare</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a class="nav-link" href="/pacienti"><i class="bi bi-people"></i> Pacienți</a>
            <a class="nav-link" href="/saloane"><i class="bi bi-door-open"></i> Saloane</a>
            <a class="nav-link" href="/terapii"><i class="bi bi-heart-pulse"></i> Terapii</a>
            <a class="nav-link active" href="/terapeuti"><i class="bi bi-person-badge"></i> Terapeuți</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    <h4 class="mb-0">
                        <i class="bi bi-person-badge-fill"></i>
                        <span th:text="${titlu}">Formular Terapeut</span>
                    </h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/terapeuti/salveaza}" th:object="${terapeut}" method="post">
                        <!-- ID ascuns -->
                        <input type="hidden" th:field="*{id}">

                        <!-- Nume și Prenume -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="nume" class="form-label">
                                    <i class="bi bi-person"></i> Nume *
                                </label>
                                <input type="text" class="form-control" id="nume"
                                       th:field="*{nume}" required>
                            </div>
                            <div class="col-md-6">
                                <label for="prenume" class="form-label">
                                    <i class="bi bi-person"></i> Prenume *
                                </label>
                                <input type="text" class="form-control" id="prenume"
                                       th:field="*{prenume}" required>
                            </div>
                        </div>

                        <!-- CNP și Telefon -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="cnp" class="form-label">
                                    <i class="bi bi-card-text"></i> CNP
                                </label>
                                <input type="text" class="form-control" id="cnp"
                                       th:field="*{cnp}"
                                       maxlength="13"
                                       pattern="[0-9]{13}"
                                       placeholder="1234567890123">
                                <small class="text-muted">13 cifre (opțional)</small>
                            </div>
                            <div class="col-md-6">
                                <label for="telefon" class="form-label">
                                    <i class="bi bi-telephone"></i> Telefon *
                                </label>
                                <input type="tel" class="form-control" id="telefon"
                                       th:field="*{telefon}" required
                                       placeholder="0721234567">
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">
                                <i class="bi bi-envelope"></i> Email *
                            </label>
                            <input type="email" class="form-control" id="email"
                                   th:field="*{email}" required
                                   placeholder="terapeut@email.com">
                        </div>

                        <!-- Specializare și Ani Experiență -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="specializare" class="form-label">
                                    <i class="bi bi-award"></i> Specializare *
                                </label>
                                <select class="form-select" id="specializare"
                                        th:field="*{specializare}" required>
                                    <option value="FIZIOTERAPEUT">Fizioterapeut</option>
                                    <option value="KINETOTERAPEUT">Kinetoterapeut</option>
                                    <option value="MASEUR">Maseur Terapeutic</option>
                                    <option value="INSTRUCTOR_HIDRO">Instructor Hidroterapie</option>
                                    <option value="RECUPERARE_MEDICALA">Recuperare Medicală</option>
                                    <option value="NURSING">Asistent Medical</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="aniExperienta" class="form-label">
                                    <i class="bi bi-clock-history"></i> Ani Experiență *
                                </label>
                                <input type="number" class="form-control" id="aniExperienta"
                                       th:field="*{aniExperienta}"
                                       min="0" max="50" required>
                            </div>
                        </div>

                        <!-- Data Angajare -->
                        <div class="mb-3">
                            <label for="dataAngajare" class="form-label">
                                <i class="bi bi-calendar"></i> Data Angajare
                            </label>
                            <input type="date" class="form-control" id="dataAngajare"
                                   th:field="*{dataAngajare}">
                        </div>

                        <!-- Activ -->
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       id="activ" th:field="*{activ}">
                                <label class="form-check-label" for="activ">
                                    <i class="bi bi-check-circle"></i> Terapeut activ și disponibil
                                </label>
                            </div>
                        </div>

                        <!-- Observații -->
                        <div class="mb-4">
                            <label for="observatii" class="form-label">
                                <i class="bi bi-info-circle"></i> Observații
                            </label>
                            <textarea class="form-control" id="observatii"
                                      th:field="*{observatii}" rows="3"
                                      placeholder="Competențe suplimentare, certificări, etc."></textarea>
                        </div>

                        <!-- Butoane -->
                        <div class="d-flex justify-content-between">
                            <a href="/terapeuti" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Înapoi
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Salvează
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-3">
                <small class="text-muted">* Câmpuri obligatorii</small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
