<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Centru Recuperare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 400px;
            width: 100%;
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header i {
            font-size: 60px;
            color: #667eea;
            margin-bottom: 15px;
        }
        .login-header h2 {
            color: #333;
            font-weight: 600;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .alert {
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <i class="bi bi-hospital"></i>
        <h2>Centru Recuperare</h2>
        <p class="text-muted">Autentificare Sistem</p>
    </div>

    <!-- Mesaj eroare -->
    <div th:if="${param.error}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle"></i>
        Username sau parola incorecte!
    </div>

    <!-- Mesaj logout -->
    <div th:if="${param.logout}" class="alert alert-success" role="alert">
        <i class="bi bi-check-circle"></i>
        Ați fost deconectat cu succes!
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">
                <i class="bi bi-person"></i> Username
            </label>
            <input type="text" class="form-control" id="username" name="username"
                   placeholder="Introduceti username" required autofocus>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">
                <i class="bi bi-lock"></i> Parola
            </label>
            <input type="password" class="form-control" id="password" name="password"
                   placeholder="Introduceti parola" required>
        </div>

        <button type="submit" class="btn btn-primary btn-login w-100">
            <i class="bi bi-box-arrow-in-right"></i> Autentificare
        </button>
    </form>

    <div class="text-center mt-4">
        <small class="text-muted">
            <i class="bi bi-info-circle"></i>
            Default: <strong>admin</strong> / <strong>admin123</strong>
        </small>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
