<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titlu}">Formular Terapie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-hospital"></i> Centru Recuperare</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a class="nav-link" href="/pacienti"><i class="bi bi-people"></i> Pacienți</a>
            <a class="nav-link" href="/saloane"><i class="bi bi-door-open"></i> Saloane</a>
            <a class="nav-link active" href="/terapii"><i class="bi bi-heart-pulse"></i> Terapii</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    <h4 class="mb-0">
                        <i class="bi bi-heart-pulse-fill"></i>
                        <span th:text="${titlu}">Formular Terapie</span>
                    </h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/terapii/salveaza}" th:object="${terapie}" method="post">
                        <!-- ID ascuns -->
                        <input type="hidden" th:field="*{id}">

                        <!-- Denumire -->
                        <div class="mb-3">
                            <label for="denumire" class="form-label">
                                <i class="bi bi-tag"></i> Denumire *
                            </label>
                            <input type="text" class="form-control" id="denumire"
                                   th:field="*{denumire}" required
                                   placeholder="Ex: Fizioterapie, Hidroterapie, Kinetoterapie">
                        </div>

                        <!-- Descriere -->
                        <div class="mb-3">
                            <label for="descriere" class="form-label">
                                <i class="bi bi-file-text"></i> Descriere
                            </label>
                            <textarea class="form-control" id="descriere"
                                      th:field="*{descriere}" rows="2"
                                      placeholder="Scurtă descriere a terapiei..."></textarea>
                        </div>

                        <!-- Durata si Pret -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="durataMinute" class="form-label">
                                    <i class="bi bi-clock"></i> Durată (minute) *
                                </label>
                                <input type="number" class="form-control" id="durataMinute"
                                       th:field="*{durataMinute}"
                                       min="1" max="300" required
                                       placeholder="30, 60, 90...">
                            </div>
                            <div class="col-md-6">
                                <label for="pret" class="form-label">
                                    <i class="bi bi-currency-exchange"></i> Preț (lei) *
                                </label>
                                <input type="number" class="form-control" id="pret"
                                       th:field="*{pret}"
                                       min="0" step="0.01" required
                                       placeholder="50.00, 100.00...">
                            </div>
                        </div>

                        <!-- Resurse si Capacitate -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="resurseNecesare" class="form-label">
                                    <i class="bi bi-tools"></i> Resurse Necesare *
                                </label>
                                <select class="form-select" id="resurseNecesare"
                                        th:field="*{resurseNecesare}" required>
                                    <option value="SALA_STANDARD">Sală Standard</option>
                                    <option value="PISCINA">Piscină Geotermală</option>
                                    <option value="ECHIPAMENT_SPECIAL">Echipament Special</option>
                                    <option value="EXTERIOR">Exterior</option>
                                    <option value="GRUP">Terapie de Grup</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="capacitateMaximaSimultana" class="form-label">
                                    <i class="bi bi-people"></i> Capacitate Simultană *
                                </label>
                                <input type="number" class="form-control"
                                       id="capacitateMaximaSimultana"
                                       th:field="*{capacitateMaximaSimultana}"
                                       min="1" max="20" required
                                       placeholder="Câți pacienți simultan">
                                <small class="text-muted">Câți pacienți pot fi tratați simultan</small>
                            </div>
                        </div>

                        <!-- Activ -->
                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       id="activ" th:field="*{activ}">
                                <label class="form-check-label" for="activ">
                                    <i class="bi bi-check-circle"></i> Terapie activă și disponibilă
                                </label>
                            </div>
                        </div>

                        <!-- Butoane -->
                        <div class="d-flex justify-content-between">
                            <a href="/terapii" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Înapoi
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Salvează
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-3">
                <small class="text-muted">* Câmpuri obligatorii</small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
