<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titlu}">Formular Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-hospital"></i> Centru Recuperare</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a class="nav-link" href="/pacienti"><i class="bi bi-people"></i> Pacienți</a>
            <a class="nav-link active" href="/saloane"><i class="bi bi-door-open"></i> Saloane</a>
            <a class="nav-link" href="/terapii"><i class="bi bi-heart-pulse"></i> Terapii</a>
            <a class="nav-link" href="/terapeuti"><i class="bi bi-person-badge"></i> Terapeuți</a>
            <a class="nav-link" href="/internari"><i class="bi bi-clipboard-pulse"></i> Internări</a>
            <a class="nav-link" href="/optimizare"><i class="bi bi-cpu"></i> Optimizare</a>
            <form method="post" th:action="@{/logout}" style="display: inline; margin-left: 10px;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                    <h4 class="mb-0">
                        <i class="bi bi-door-open-fill"></i>
                        <span th:text="${titlu}">Formular Salon</span>
                    </h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/saloane/salveaza}" th:object="${salon}" method="post">
                        <!-- ID ascuns -->
                        <input type="hidden" th:field="*{id}">

                        <!-- Numar si Capacitate -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="numar" class="form-label">
                                    <i class="bi bi-hash"></i> Număr Salon *
                                </label>
                                <input type="text" class="form-control" id="numar"
                                       th:field="*{numar}" required
                                       placeholder="101, 102, 201...">
                                <small class="text-muted">Ex: 101 (etaj 1, camera 01)</small>
                            </div>
                            <div class="col-md-6">
                                <label for="capacitate" class="form-label">
                                    <i class="bi bi-person"></i> Capacitate (paturi) *
                                </label>
                                <input type="number" class="form-control" id="capacitate"
                                       th:field="*{capacitate}"
                                       min="1" max="10" required>
                            </div>
                        </div>

                        <!-- Etaj si Tip -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="etaj" class="form-label">
                                    <i class="bi bi-building"></i> Etaj *
                                </label>
                                <select class="form-select" id="etaj" th:field="*{etaj}" required>
                                    <option value="0">Parter</option>
                                    <option value="1">Etaj 1</option>
                                    <option value="2">Etaj 2</option>
                                    <option value="3">Etaj 3</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="tip" class="form-label">
                                    <i class="bi bi-tag"></i> Tip Salon *
                                </label>
                                <select class="form-select" id="tip" th:field="*{tip}" required>
                                    <option value="STANDARD">STANDARD</option>
                                    <option value="VIP">VIP</option>
                                    <option value="TERAPIE">TERAPIE</option>
                                    <option value="RECUPERARE">RECUPERARE</option>
                                </select>
                            </div>
                        </div>

                        <!-- Disponibil -->
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox"
                                       id="disponibil" th:field="*{disponibil}">
                                <label class="form-check-label" for="disponibil">
                                    <i class="bi bi-check-circle"></i> Salon disponibil pentru internări
                                </label>
                            </div>
                        </div>

                        <!-- Observatii -->
                        <div class="mb-4">
                            <label for="observatii" class="form-label">
                                <i class="bi bi-info-circle"></i> Observații
                            </label>
                            <textarea class="form-control" id="observatii"
                                      th:field="*{observatii}" rows="3"
                                      placeholder="Dotări speciale, accesibilitate, etc."></textarea>
                        </div>

                        <!-- Butoane -->
                        <div class="d-flex justify-content-between">
                            <a href="/saloane" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Înapoi
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Salvează
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="mt-3">
                <small class="text-muted">* Câmpuri obligatorii</small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
